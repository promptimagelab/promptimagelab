# Nginx snippet: include this in your server block or paste into site config
# 1) /index.html -> /
location = /index.html {
    return 301 /;
}

# 2) If a clean path without extension has a corresponding .html file, redirect to it.
# This uses try_files to defer to @maybe_html which checks for the .html file.
location / {
    try_files $uri $uri/ @maybe_html;
}

location @maybe_html {
    # If URI contains a dot, it's likely a file; return 404
    if ($request_uri ~ "\.") { return 404; }

    # remove trailing slash for candidate
    set $cand $request_uri;
    if ($cand ~ "^(.+?)/$") { set $cand $1; }

    # if candidate.html exists, redirect to it
    if (-f $document_root$cand.html) {
        return 301 $scheme://$host$cand.html;
    }

    return 404;
}

# End nginx redirect snippet
